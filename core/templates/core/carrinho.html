{% extends "core/base.html" %}
{% load static %}

{% block body %}

<div style="background-color: rgb(14, 54, 57); min-height: 100vh; padding-top: 20px;">

    <div style="display: flex; justify-content: center;">
        <div style="width: 1200px; background-color: rgb(15, 0, 0); padding: 20px;">

            <h1 style="color: white; text-align: center;">Itens no carrinho</h1>

            <table class="table table-striped-columns">
                <thead>
                    <tr>
                        <th style="width: 20%;">Id</th>
                        <th style="width: 40%;">Album</th>
                        <th style="width: 40%;">Preço</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in carrinho %}
                    <tr>
                        <td>{{item.id}}</td>
                        <td>{{item.album.titulo}}</td>
                        <td>{{item.album.valor}}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <div class="text-center mt-3">
                <form action="{% url 'finalizar_compra' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-success">
                        Finalizar compra
                    </button>
                </form>
            </div>

        </div>
    </div>

</div>

{% endblock %}
