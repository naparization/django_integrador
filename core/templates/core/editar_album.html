{% extends 'core/base.html' %}

{% block body %}

<h1>Editar Álbum</h1>

<form method="POST">
{% csrf_token %}

Título:
<input type="text" name="titulo" value="{{ album.titulo }}">

<br><br>

Valor:
<input type="number" step="0.01" name="valor" value="{{ album.valor }}">

<br><br>

Quantidade:
<input type="number" name="quantidade" value="{{ album.quantidade }}">

<br><br>

<button type="submit">Salvar</button>

</form>

{% endblock %}
