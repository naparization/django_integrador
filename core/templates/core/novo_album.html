{% extends 'core/base.html' %}

{% block body %}

<h1>Novo Álbum</h1>

<form method="POST">
    {% csrf_token %}

    Título:
    <input type="text" name="titulo">

    <br><br>

    Valor:
    <input type="number" step="0.01" name="valor">

    <br><br>

    Quantidade:
    <input type="number" name="quantidade">

    <br><br>

    Id Artista (1 = Michael):
    <input type="number" name="artista">

    <br><br>

    <button type="submit">Salvar</button>

</form>

{% endblock %}
